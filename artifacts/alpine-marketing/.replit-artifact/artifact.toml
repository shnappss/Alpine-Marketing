kind = "web"
previewPath = "/"
title = "Alpine Marketing"
version = "1.0.0"
id = "artifacts/alpine-marketing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23057

[services.development]
run = "pnpm --filter @workspace/alpine-marketing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alpine-marketing", "run", "build" ]
publicDir = "artifacts/alpine-marketing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23057"
BASE_PATH = "/"
